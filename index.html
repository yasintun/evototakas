<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Evototakas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #F7F9FC;
      text-align: center;
    }
    .container {
      padding: 80px 20px;
    }
    h1 {
      color: #2F80ED;
      font-size: 40px;
    }
    p {
      color: #555;
      font-size: 18px;
    }
    .btn {
      margin-top: 20px;
      padding: 15px 30px;
      background: #2F80ED;
      color: white;
      border-radius: 10px;
      text-decoration: none;
      display: inline-block;
    }
    form {
      margin-top: 40px;
    }
    input {
      display: block;
      margin: 10px auto;
      padding: 10px;
      width: 250px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Evototakas</h1>
  <p>Satmadan değiştir. Evini, arabanı ya da arsanı kolayca takas et.</p>

  <a href="#" class="btn">Takasını Başlat</a>

  <form>
    <input type="text" placeholder="Ad Soyad">
    <input type="text" placeholder="Telefon">
    <input type="text" placeholder="Ne takas etmek istiyorsun?">
  </form>
</div>

</body>
</html>
